<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadence Station</title>
  <style>
    :root {
      --bg: #0d0d0e;
      --surface: #161618;
      --surface-2: #1e1e22;
      --accent: #6C63FF;
      --text: #e8e8f0;
      --text-secondary: #8888a0;
      --border: rgba(255,255,255,0.08);
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }
    .brand {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .tagline {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .divider {
      height: 1px;
      background: var(--border);
    }
    .duration-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .duration-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .duration-options {
      display: flex;
      gap: 6px;
    }
    .duration-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms ease;
      font-family: inherit;
    }
    .duration-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .duration-btn.selected {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.12);
      color: var(--accent);
    }
    .start-btn {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 150ms ease;
    }
    .start-btn:hover { opacity: 0.88; }
    .start-btn:active { opacity: 0.7; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      justify-content: center;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
    }
    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.5);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><span class="logo-text">C</span></div>
    <div>
      <div class="brand">Cadence Station</div>
      <div class="tagline">Focus. Together.</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="duration-section">
    <div class="duration-label">Duration</div>
    <div class="duration-options" id="durations">
      <button class="duration-btn" data-mins="25">25m</button>
      <button class="duration-btn selected" data-mins="50">50m</button>
      <button class="duration-btn" data-mins="90">90m</button>
    </div>
  </div>

  <button class="start-btn" id="startBtn">Start Focus Session</button>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Ready to focus</span>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
